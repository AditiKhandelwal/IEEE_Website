    <div class="container py-3">
      <div
        class="w-100 d-flex justify-content-between align-items-center flex-wrap"
      >
        <div class="col-12 col-md-4">
          <img src="../assets/contact.svg" alt="" class="w-100" />
        </div>
        <div class="col-12 col-md-8 justify-content-between">
          <p class="h3 text-center">Have a Question ?</p>
          <p class="h4 text-center">Contact Us</p>
          <hr />
          <form
            action="https://formspree.io/f/mpzodeyz"
            method="POST"
            class="d-flex flex-wrap justify-content-center"
          >
            <div class="w-100 row justify-content-center m-0">
              <div class="col-12 col-md-6">
                <label for="fname">First Name : </label><br />
                <input
                  type="text"
                  placeholder="First Name"
                  class="w-100 rounded p-2 customInput"
                  name="fname"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="lname">Last Name : </label><br />
                <input
                  type="text"
                  placeholder="Last Name"
                  class="w-100 rounded p-2 customInput"
                  name="lname"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="mobile">Contact Number : </label><br />
                <input
                  type="text"
                  placeholder="9876543210"
                  class="w-100 rounded p-2 customInput"
                  name="contact-number"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="email">Email : </label><br />
                <input
                  type="text"
                  placeholder="abc@sample.com"
                  class="w-100 rounded p-2 customInput"
                  name="email"
                />
              </div>
              <div class="col-12">
                <label for="message">Your Query / Message : </label>
                <textarea
                  name="message"
                  id=""
                  rows="5"
                  class="customInput w-100"
                ></textarea>
              </div>
            </div>
            <button class="btn btn-outline-secondary mx-auto" type="submit">
              Send Message
            </button>
          </form>
        </div>
      </div>
